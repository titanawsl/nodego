<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星境 · 独一无二的静态空间</title>
    <style>
        :root {
            --bg-color: #0a0a16;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #8a8a9e;
            --accent: #7f5af0;
            --accent-glow: rgba(127, 90, 240, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Canvas 背景占满全屏 */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 主体交互卡片（毛玻璃效果） */
        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            transition: all 0.3s ease;
        }

        .container:hover {
            border-color: rgba(127, 90, 240, 0.3);
            box-shadow: 0 12px 40px 0 rgba(127, 90, 240, 0.15);
        }

        /* 创意时钟区 */
        .clock-box {
            margin-bottom: 30px;
        }

        #time {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #fff, var(--text-sub));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #date {
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* 分割线 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-border), transparent);
            margin: 25px 0;
        }

        /* 语录区 */
        .quote-box {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #quote-cn {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 10px;
            font-weight: 300;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.6s forwards;
        }

        #quote-en {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.5;
            font-style: italic;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.6s 0.2s forwards;
        }

        /* 互动按钮 */
        .action-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--accent);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        /* 动画效果 */
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式适配 */
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            #time { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <!-- 动态粒子画布 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 交互卡片 -->
    <div class="container">
        <!-- 时钟模块 -->
        <div class="clock-box">
            <div id="time">00:00:00</div>
            <div id="date">LOADING...</div>
        </div>

        <div class="divider"></div>

        <!-- 灵感语录模块 -->
        <div class="quote-box">
            <p id="quote-cn">正在观测星道...</p>
            <p id="quote-en"></p>
        </div>

        <!-- 互动按钮 -->
        <button class="action-btn" onclick="refreshQuote()">捕捉新思绪</button>
    </div>

    <script>
        // ==================== 1. 动态粒子背景引擎 ====================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 60;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 2 + 0.5;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.fade = Math.random() * 0.005 + 0.002;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界碰撞或淡出后重置
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.shadowBlur = 4;
                ctx.shadowColor = "#fff";
                ctx.fill();
                ctx.shadowBlur = 0; // 重置阴影避免性能损耗
            }
        }

        // 初始化粒子
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // 连线逻辑
        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(127, 90, 240, ${0.15 * (1 - distance / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            drawLines();
            requestAnimationFrame(animate);
        }
        animate();


        // ==================== 2. 实时数字时钟 ====================
        function updateClock() {
            const now = new Date();
            
            // 格式化时间
            const pad = (num) => String(num).padStart(2, '0');
            const hours = pad(now.getHours());
            const minutes = pad(now.getMinutes());
            const seconds = pad(now.getSeconds());
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;

            // 格式化日期
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', options);
        }
        setInterval(updateClock, 1000);
        updateClock(); // 立即执行一次


        // ==================== 3. 独一无二的语录库 ====================
        const quotes = [
            { cn: "所谓的奇迹，只是努力的另一个名字。", en: "The so-called miracle is just another name for effort." },
            { cn: "在浩瀚的宇宙中，你本身就是一个璀璨的星系。", en: "In the vast universe, you yourself are a brilliant galaxy." },
            { cn: "前路浩浩荡荡，万物皆可期待。", en: "The road ahead is vast, and everything is worth looking forward to." },
            { cn: "把普通的日子过得浪漫一些，就不算虚度。", en: "Make ordinary days a bit romantic, and they won't be wasted." },
            { cn: "去追赶时间的倒影，而不是被它推着向前。", en: "Chase the reflection of time, rather than being pushed forward by it." },
            { cn: "保持热爱，山海皆可平。", en: "Keep your love alive, and mountains and seas can be leveled." },
            { cn: "每一个不曾起舞的日子，都是对生命的辜负。", en: "Every day we should consider lost on which we have not danced at least once." }
        ];

        let lastIndex = -1;

        function refreshQuote() {
            const cnEl = document.getElementById('quote-cn');
            const enEl = document.getElementById('quote-en');

            // 避免连续抽到相同的句子
            let index;
            do {
                index = Math.floor(Math.random() * quotes.length);
            } while (index === lastIndex);
            lastIndex = index;

            // 触发重新播放入场动画
            cnEl.style.animation = 'none';
            enEl.style.animation = 'none';
            
            // 强制重绘
            void cnEl.offsetWidth; 
            void enEl.offsetWidth;

            // 填充内容
            cnEl.textContent = quotes[index].cn;
            enEl.textContent = quotes[index].en;

            // 重新绑定动画
            cnEl.style.animation = 'fadeIn 0.6s forwards';
            enEl.style.animation = 'fadeIn 0.6s 0.2s forwards';
        }
        
        // 首次加载页面时初始化一条语录
        refreshQuote();
    </script>
</body>
</html>
